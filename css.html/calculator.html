<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: rgb(168, 168, 168);
        background-color: rgb(135, 255, 135);
    }
    .calculator{
        width: 350px;
        height: 530px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 10px;
        border-radius: 20px;
        background: linear-gradient(rgb(52, 52, 52),rgb(47, 47, 47),black);
    }
    #top{
        text-align: right;
        margin-bottom: 10px;
        font-size: 25px;
        padding: 0 20px;
    }
    #top input{
        width: 100%;
        height: 80px;
        font-size: 50px;
        text-align: right;
        border-radius: 80px;
        border: none;
        box-shadow: 10px 10px 30px black;
    }

    #bottom{
        display: flex;
        justify-content: center;
        align-items: center;
    }
    table{
        width: 100%;
        height: 350px;
        text-align: center;
    }
    button{
        font-size: 26px;
        background: none;
        border: none;
    }
    .b{
        color: rgb(210, 210, 210);
    }
    .g{
        color: rgb(56, 255, 56);
    }
</style>
<body>
    <div class="calculator">
        <div id="top">
            <p>73 x 4</p>
            <input type="text" />
        </div>
        <div id="bottom">
            <table>
                <tr>
                    <td><button class="g">C</button></td>
                    <td><button class="g">m</button></td>
                    <td><button class="g">%</button></td>
                    <td><button class="g">/</button></td>
                </tr>
                <tr>
                    <td><button class="b">7</button></td>
                    <td><button class="b">8</button></td>
                    <td><button class="b">9</button></td>
                    <td><button class="g">x</button></td>
                </tr>
                <tr>
                    <td><button class="b">4</button></td>
                    <td><button class="b">5</button></td>
                    <td><button class="b">6</button></td>
                    <td><button class="g">-</button></td>
                </tr>
                <tr>
                    <td><button class="b">1</button></td>
                    <td><button class="b">2</button></td>
                    <td><button class="b">3</button></td>
                    <td><button class="g">+</button></td>
                </tr>
                <tr>
                    <td><button class="b">0</button></td>
                    <td><button class="b">.</button></td>
                    <td><button class="b">+/-</button></td>
                    <td><button class="g">=</button></td>
                </tr>
            </table>
        </div>
    </div>
</body>

</html>
