<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="design.css">
</head>
<style>
    @font-face {
    font-family: "Curl";
    src: url("fonts/Bubble\ Gum\ PERSONAL\ USE\ ONLY!.ttf");
}
@font-face {
    font-family: "Main";
    src: url("fonts/NewakeFont-Demo.otf");
}
*{
    font-family: "Curl";
}
.nav{
    display: flex;
    justify-content: space-between;
    align-items: center;
    background-color: #f0f0f0;
    padding: 10px 5px;
}
.nav h1{
    font-family: "Main";
    font-size: 40px;
    text-transform: uppercase;
}
.nav ul{
    display: flex;
    gap: 40px;
    list-style: none;
    justify-content: center;

}
.nav ul li a{
    font-family: "Main";
    text-decoration: none;
    color: black;
    font-weight: lighter;
}
.nav>a{
    text-decoration: none;
    font-size: 25px;
    color: rgb(249, 249, 126);
    background-color: rgb(0, 79, 0);
    padding: 10px 20px;
    border-radius: 72% 28% 75% 25% / 60% 43% 57% 40% ;
}

.hero{
    display: flex;
    padding: 20px;
    gap: 5px;
    height: 100vh;
    flex: 2;

    
}
.part1{
    background-color: rgb(255, 188, 63);
    width: 65%;
    height: 80%;
    border-radius: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
}
.part1 h1{
    font-size: 200px;
    color: white;
    max-width: 75%;
    text-align: center;
    line-height: 1;
    overflow-wrap: break-word;
    word-break: break-word;
    white-space: normal;
}
.part1 .img{
    position: absolute;
    width: 400px;
    height: 500px;
    object-fit: cover;
    left:260px
}
.part1 #bottom1{
    display: flex;
    justify-content: space-between;
    align-items: end;
    position: absolute;
    bottom: 0;
    width: 80%;
    margin: 0 40px;
}
#bottom1 h1{
    font-size: 60px;
    font-family: "Main";
}
.part2{
   width: 700px;
    padding: 35px 40px;
    border-radius: 50px;
    background-color: whitesmoke;
    display: flex;
    flex: 1;
}
.item img{
    width: 70px;
    height: 70px;
    background-color: rgba(255, 255, 255, 0.207);
    border: 1px solid white;
    border-radius: 20px;
}
.items{
   display: grid;
   grid-template-columns: 60px 120px 1fr 80px 50px;
   align-items: center;
   gap: 10px;
   padding: 15px 0;
   border-bottom: 1px solid #ddd;
   float: right;
}
.item{
    border-bottom: 1px solid #ccc;
    padding-bottom: 15px;
}
button{
    width: 34px;
    height: 30px;
    border: none;
    border-radius: 83% 17% 86% 14% / 74% 30% 70% 26% ;
    background-color: #2e7d32;
    color: white;
    font-size: 25px;
    cursor: pointer;
}
.blue-card{
   display: flex;
   flex-direction: column;
   flex: 1;

}





</style>
<body>
    <nav class="nav">
        <h1>Swirlzy</h1>
        <ul>
            <li><a href="#">Life and News</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Store</a></li>
            <li><a href="#">Receipe</a></li>
        </ul>
        <a href="">Cart</a>
    </nav>
    <div class="hero">
        <div class="part1">
            <h1>Sweeeeeeeet!</h1>
            <img class="img" src="https://png.pngtree.com/png-vector/20240913/ourmid/pngtree-soft-cookies-png-image_12896555.png"/>
            <div id="bottom1">
                <p>Freshly Crafted Treats</p>
                <h1>4.8</h1>
                <div class="images">
                    <img src="https://png.pngtree.com/png-vector/20250425/ourmid/pngtree-chocolate-chip-cookie-icon-white-background-png-image_16100260.png"/>
                    <img src="https://png.pngtree.com/png-vector/20250425/ourmid/pngtree-chocolate-chip-cookie-icon-white-background-png-image_16100260.png"/>
                    <img src="https://png.pngtree.com/png-vector/20250425/ourmid/pngtree-chocolate-chip-cookie-icon-white-background-png-image_16100260.png"/>
                </div>
            </div>
            </div>
            </div>
            <div class="part2">
        <h2>Top-5<br/>Picks</h2>
        <div class="items">
            <div class="item">
             <img src="https://png.pngtree.com/png-clipart/20240830/original/pngtree-burger-with-floating-ingredient-png-image_15881303.png" />
        </div>
        <h4><b>Honey<br />Bun</b></h4>
        <span>
            Fluffy bun with sweet<br />honey glaze
        </span>
        <span><b>$4.99</br />each</b></span>
        <button>+</button>
        
         <div class="item">
         <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQwdjSxL7L9Aj63i1veV1RAm1gHjHEDAdC4UA&s"/>
        </div>
        <h4><b>Melon<br />Buns</b></h4>
        <span>
            Light bun with smooth<br />melon filling
        </span>
        <span><b>$5.50</br />each</b></span>
        <button>+</button>
        </div>
        </div>
        <div class="blue-card">
        <div class="name">
            <h2>SCHOOL</h2>
            <p>Learn to bake deliciously</p>
        </div>
        </div>
        
       
        
        
        
        
        
        
        </body>
        
        </html>
