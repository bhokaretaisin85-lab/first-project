<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form tag css</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        
    }
    .form{
        display: flex;
        flex-direction: column;
        border-radius: 30px;
        padding: 30px 25px;
        width: 600px;
        box-shadow: 10px 10px 30px rgba(0, 0,  0, 0.2);
    }
    #heading{
        line-height: 10px;
    }
    form{
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        gap: 30px;
    }
    form div{
        display: flex;
        justify-content: space-between;
    }
    input{
        width: 47%;
        height: 45px;
        border-radius: 4px;
        border: none;
        padding: 0 0 0 5px;
        background-color: rgb(233, 233, 233);
    }
    #msg{
        width: 100%;
        height: 80px;
    }
    .terms{
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
    }
    .terms input{
        height: 20px;
        width: 20px;
    }
    button{
        height: 50px;
        border: none;
        border-radius: 4px;
        background-color: black;
        color: white;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        align-self: flex-start;
        margin-top: -20px;
        padding: 0 30px;
    }
</style>
<body>
    <div class="form">
        <div id="heading">
            <h1>Sens Us a Message</h1>
            <p>Please fill in the form below to get in touch with us.</p>
        </div>
    <form>
        <div>
            <input type="text" placeholder="First Name"/>
            <input type="text" placeholder="Last Name"/>
        </div>
        <div>
            <input type="text" placeholder="Email Address"/>
            <input type="text" placeholder="Phone Number"/>
        </div>
        <input type="text" id="msg" placeholder="Message"/>
        <div class="terms">
            <input type="checkbox"/>
            <p>I have read and agree with <u>Terms of service</u> and <u>Privact policy.</u></p>
    </form>

</body>
</html>
