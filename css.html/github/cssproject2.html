<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css project2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<style>
    body{
        padding: 0;
        margin: 0;
  font-family: "Oswald", sans-serif;
  background-image: url("https://www.creative-tim.com/blog/content/images/2021/11/frontend-developer.jpg");
  background-repeat: no-repeat;
    }

    nav{
        background-color: rgba(0, 0, 0, 0.329);
        color: white;
        height: 4rem;
        display: flex;
        justify-content: space-between;
        padding: 0 4rem;
    }

    .nav-opt{
        display: flex;
    }
    ul li{
        margin-left: 20px;
        list-style: none;
    }
    ul li a{
        color: white;
        text-decoration: none;
    }
    .container{
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
       
    }
    .card{
        background-color: rgba(255, 255, 255, 0.137);
        color: white;
        padding: 40px;
        width: 700px;
        text-align: center;
        border-radius: 1rem;
        backdrop-filter: blur(10px);
       
    }
    .card h1{
        font-size: 40px;
        padding: 20px;
    }
    .card p{
        font: 18px;
        line-height: 1.8rem;
    }
</style>
<body>
    <nav>
    <h2>Code Sphere</h2>
    <ul class="nav-opt">
        <li><a href="">Home</a></li>
        <li><a href="">About</a></li>
        <li><a href="">Services</a></li>
        <li><a href="">Contact</a></li>
    </ul>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Welcome to code Sphere</h1>
            <p>Learn web development,python,ans real-word projects with us.Your journey to becoming a gread developer starts here!</p>
        </div>
    </div>
</body>
</html>
