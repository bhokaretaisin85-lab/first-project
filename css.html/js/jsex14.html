    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maximum between 3 number</title>
</head>
<script>
    y=parseInt(prompt("Enter year"));
    if(y%4==0){
        console.log(y+"is a leap year");
    }
    else{
        console.log(y+"is not a leap year");
    }
</script>
