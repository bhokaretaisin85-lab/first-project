<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>
    modifyText=()=>{
        font = document.getElementById("font").value;
        color = document.getElementById("color").value;
        bg = document.getElementById("bg").value;
        border = document.getElementById("border").value;
        bordercolor=document.getElementById("bordercolor").value;
        heading = document.getElementById("heading");
        heading.style.fontSize = font+"px";
        heading.style.color = color;
        heading.style.backgroundColor = bg;
        heading.style.border = border+"px dashed "+bordercolor;
    }
</script>
<body>
    <h1 id="heading">Text Modify</h1>
    <input type="text"id="font"placeholder="Enter font size"/><br/>
    select color:
    <select id="color">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="orange">Orange</option>
        <option value="green">Green</option>
    </select><br/>
    select background color:
    <select id="bg">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="orange">Orange</option>
        <option value="green">Green</option>
    </select><br/>    
    
    <input type="text"id="border"placeholder="Enter border size"/><br/>
    select border color:
    <select id="bordercolor">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="orange">Orange</option>
        <option value="green">Green</option>   
    </select><br/>
    <button onclick="modifyText()">Change</button>
</body>
</html>
