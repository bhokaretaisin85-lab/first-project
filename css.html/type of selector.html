<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type of selectors</title>
    <style>
        #div1{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            background-color: grey;
        }
        #img1, #img2{
             width: 300px;
             height: 200px;
             border-bottom-left-radius: 20px;
        }
        td{
            font-size: 40px;
        }
    </style>
    </head>
    <body>
        <div id="div1">
        <tr>
            <h1><td>Ronaldo</td></h1>
            <td><img id="img1" src="https://www.liveabout.com/thmb/3VBOh1lq0MPkooGjmYonKfC0lFk=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/Cristiano_Ronaldo_real_madrid_486300423-56aa3ad95f9b58b7d002b71e.jpg"/></td>
        </tr>
        <tr>
            <h1><td>Messi</td></h1>
            <td><img id="img2" src="https://library.sportingnews.com/styles/crop_style_16_9_desktop_webp/s3/2022-11/Lionel%20Messi%202.jpg.webp?itok=kVXp04o9"/></td>            
        </tr>
        </div>
    </body>
</html>
